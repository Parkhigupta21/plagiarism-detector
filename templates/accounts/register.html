<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Plagiarism Detector</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4e54c8,#8f94fb);
        }

        .container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        form p{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#4e54c8;
            border:none;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#3b40a4;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            color:#4e54c8;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Register</h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Register  
            </button>

        </form>

        <div class="bottom-text">

            Don't have an account?

            <a href="/login/">
                Login 
            </a>

        </div>

    </div>

</body>
</html>
