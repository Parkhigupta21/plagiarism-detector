<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Documents</title>

    <style>

        body{

            font-family:Arial, Helvetica, sans-serif;

            background:#f4f6f9;

            padding:40px;
        }

        .container{

            max-width:900px;

            margin:auto;
        }

        h1{

            margin-bottom:30px;

            color:#4e54c8;

            font-size:48px;
        }

        .card{

            background:white;

            padding:25px;

            border-radius:12px;

            margin-bottom:20px;

            box-shadow:0 5px 15px rgba(0,0,0,0.08);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-3px);

            box-shadow:0 8px 20px rgba(0,0,0,0.12);
            border-color:#6366f1;
        }

        .doc-link{

            text-decoration:none;

            color:#111827;

            font-size:24px;

            font-weight:bold;

            transition:0.3s;
        }

        .doc-link:hover{

            color:#4e54c8;
        }

        .meta{

            margin-top:10px;

            color:#6b7280;

            font-size:14px;
        }

        .back-btn{

            display:inline-block;

            margin-top:20px;

            text-decoration:none;

            background:#4e54c8;

            color:white;

            padding:12px 20px;

            border-radius:8px;

            transition:0.3s;
        }

        .back-btn:hover{

            background:#373bb5;
        }

        .empty{

            text-align:center;

            font-size:20px;

            color:#6b7280;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>My Documents</h1>

        {% if documents %}

            {% for doc in documents %}

                <div class="card">

                    <a
                        class="doc-link"
                        href="/document/{{ doc.id }}/"
                        target="_blank"
                    >

                        {{ doc.filename }}

                    </a>

                    <div class="meta">

                        Uploaded File

                    </div>

                </div>

            {% endfor %}

        {% else %}

            <div class="card empty">

                <p>No documents available.</p>

            </div>

        {% endif %}

        <a class="back-btn" href="/dashboard/">

            Back to Dashboard

        </a>

    </div>

</body>

</html>
